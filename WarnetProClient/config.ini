[server]
; URL server WarnetPro (ganti dengan IP server sebenarnya)
url = http://127.0.0.1:8000
; Nama PC — harus sesuai dengan yang terdaftar di dashboard WarnetPro
pc_name = PC-01

[client]
; Interval kirim heartbeat ke server (detik)
heartbeat_interval = 5
; Interval polling status sesi (detik)
status_poll_interval = 3
; Interval polling perintah dari operator (detik)
command_poll_interval = 2
; Kualitas kompresi JPEG screenshot (1-95, lebih kecil = lebih kecil ukurannya)
screenshot_quality = 60
